name: "Test Library (CPP/Python)"

on:
  push:
    paths:
      - "library/**"
      - "tester/**"
      - ".github/workflows/test.yml"
  workflow_dispatch:

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cpp-test:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    name: CPP Test (GoogleTest)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show g++ version
        run: g++ --version

      - name: Count C++ test files
        id: cpp_test_files
        run: |
          if [ -d tester/cpp/unit ]; then
            count=$(find tester/cpp/unit -type f -name '*.cpp' | wc -l)
          else
            count=0
          fi
          echo "count=${count}" >> "$GITHUB_OUTPUT"

      - name: Skip C++ tests when no test files
        if: steps.cpp_test_files.outputs.count == '0'
        run: echo "No C++ test files found under tester/cpp/unit. Skipping C++ tests."

      - name: Run C++ tests
        if: steps.cpp_test_files.outputs.count != '0'
        run: make test-cpp

  python-test:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    name: Python Test (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show Python version
        run: python --version

      - name: Install pytest
        run: pip install pytest

      - name: Count Python test files
        id: python_test_files
        run: |
          if [ -d tester/python/unit ]; then
            count=$(find tester/python/unit -type f -name '*.py' | wc -l)
          else
            count=0
          fi
          echo "count=${count}" >> "$GITHUB_OUTPUT"

      - name: Skip Python tests when no test files
        if: steps.python_test_files.outputs.count == '0'
        run: echo "No Python test files found under tester/python/unit. Skipping Python tests."

      - name: Run Python tests
        if: steps.python_test_files.outputs.count != '0'
        run: make test-py

  all-tests:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    name: All Tests Summary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - cpp-test
      - python-test
    if: always()

    steps:
      - name: Verify all required jobs succeeded
        run: |
          if [ "${{ needs.cpp-test.result }}" != "success" ] || [ "${{ needs.python-test.result }}" != "success" ]; then
            echo "At least one required test job failed."
            exit 1
          fi
          echo "Both C++ and Python test jobs succeeded."
